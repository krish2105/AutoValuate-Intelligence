name: Deploy CV service (Hugging Face Space)

# Mirrors cv-service/ into the Hugging Face Space git remote on push to main.
# HF Spaces deploy on git push, so this is the deploy.
# Secrets required: HF_TOKEN (write), HF_USERNAME, HF_SPACE (e.g. "autovaluate-cv").

on:
  push:
    branches: [main]
    paths:
      - "cv-service/**"
      - ".github/workflows/deploy-cv-space.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Guard — require HF secrets
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "HF_TOKEN not set — skipping (add HF_TOKEN/HF_USERNAME/HF_SPACE in Settings → Secrets)."
            exit 0
          fi

      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Push cv-service/ to the Space remote
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          [ -z "$HF_TOKEN" ] && exit 0
          cd cv-service
          git init -q
          git config user.email "ci@autovaluate.local"
          git config user.name "autovaluate-ci"
          git lfs install
          git add -A
          git commit -q -m "ci: deploy cv-service $(git rev-parse --short HEAD 2>/dev/null || echo build)" || echo "nothing to commit"
          git push --force "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}" HEAD:main
          echo "Pushed cv-service to HF Space ${HF_USERNAME}/${HF_SPACE}."
