name: Supabase keep-alive

# Supabase free projects auto-pause after 7 days with zero API traffic.
# This pings a lightweight REST endpoint every ~3 days so the portfolio link
# never opens to a paused, dead database.
# Secrets required: SUPABASE_URL, SUPABASE_ANON_KEY.

on:
  schedule:
    - cron: "17 6 */3 * *" # 06:17 UTC every 3rd day
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "SUPABASE_URL not set — skipping keep-alive."
            exit 0
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/comparables?select=listing_id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded HTTP $code"
          # 200 (rows) or 404 (table not yet created) both prove the project is awake
          if [ "$code" = "200" ] || [ "$code" = "404" ] || [ "$code" = "206" ]; then
            echo "Project is awake."
          else
            echo "Unexpected status $code"; exit 1
          fi
