# Frontend build + E2E gate (master plan WS F2): every PR must build clean and pass
# the Playwright suite — smoke, hero animation (incl. reduced-motion), and axe a11y.
name: Frontend CI

on:
  pull_request:
    paths: ["frontend/**", ".github/workflows/frontend-ci.yml"]
  push:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/frontend-ci.yml"]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (prebuild stages the ORT wasm runtime)
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E + a11y tests
        run: npx playwright test

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: frontend/test-results
          retention-days: 7
