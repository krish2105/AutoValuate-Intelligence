name: Grow comparables corpus (Phase E)

# Corpus size is the biggest lever on retrieval quality, so we grow it on a schedule
# rather than as a one-off. Append-only + dedupe by listing_id, so price history
# accumulates and a depreciation-over-time signal becomes possible later.
on:
  schedule:
    - cron: "17 3 * * 1" # Mondays, 03:17 UTC — off-peak for the free Apify tier
  workflow_dispatch:
    inputs:
      per_make:
        description: "Listings to fetch per make"
        default: "40"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        # pandera: validate_corpus.py imports it (WS A4) — its absence broke a whole run
        run: pip install --quiet pandas numpy requests joblib scikit-learn fastembed rank-bm25 pandera

      - name: Scrape fresh listings
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python scripts/scrape_comparables.py --per-make "${{ github.event.inputs.per_make || 40 }}"

      - name: Validate the corpus (a bad scrape must never merge)
        run: python scripts/validate_corpus.py --min-rows 672

      - name: Rebuild the retrieval index
        run: python backend-api/agents/build_comparables_index.py

      - name: Re-run the retrieval eval (a bigger corpus must not regress quality)
        run: python eval/comparables_eval.py || echo "::warning::comparables eval reported a regression"

      - name: Commit the grown corpus
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # price_history.csv accrues on EVERY successful scrape (re-sightings), even when no
          # new listings joined the corpus — so it is part of both the diff check and the add.
          git add -N data/processed/price_history.csv 2>/dev/null || true
          if git diff --quiet -- data/processed/comparables.csv backend-api/models/comparables_index.joblib data/processed/price_history.csv; then
            echo "no new listings and no new sightings — nothing to commit"
            exit 0
          fi
          rows=$(($(wc -l < data/processed/comparables.csv) - 1))
          git add data/processed/comparables.csv data/processed/price_history.csv backend-api/models/comparables_index.joblib eval/comparables_eval.json
          # honest history: a snapshots-only run must not claim the corpus grew
          if git diff --cached --quiet -- data/processed/comparables.csv; then
            snaps=$(($(wc -l < data/processed/price_history.csv) - 1))
            git commit -m "data: accrue price snapshots to ${snaps} sightings, corpus unchanged at ${rows} (automated)"
          else
            git commit -m "data: grow comparables corpus to ${rows} listings (automated)"
          fi
          git push
