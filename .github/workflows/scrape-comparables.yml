name: Grow comparables corpus (Phase E)

# Corpus size is the biggest lever on retrieval quality, so we grow it on a schedule
# rather than as a one-off. Append-only + dedupe by listing_id, so price history
# accumulates and a depreciation-over-time signal becomes possible later.
on:
  schedule:
    - cron: "17 3 * * 1" # Mondays, 03:17 UTC — off-peak for the free Apify tier
  workflow_dispatch:
    inputs:
      scale:
        description: "Scale factor on the per-make allocation (0.1 = cheap smoke run)"
        default: "1.0"
      budget:
        description: "Hard ceiling on items requested this run (cost rail; 240 ~= $0.72)"
        default: "240"
      capture_fixture:
        description: "Capture a real Apify payload as a test fixture instead of scraping (free)"
        default: "false"
      skip_scrape:
        description: "Skip the scrape job (use with capture_fixture=true to spend nothing)"
        default: "false"

permissions:
  contents: write

jobs:
  scrape:
    # Lets a fixture capture run without also spending Apify credit on a scrape.
    if: github.event.inputs.skip_scrape != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        # pandera: validate_corpus.py imports it (WS A4) — its absence broke a whole run
        run: pip install --quiet pandas numpy requests joblib scikit-learn fastembed rank-bm25 pandera

      - name: Scrape fresh listings
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          python scripts/scrape_comparables.py \
            --scale "${{ github.event.inputs.scale || 1.0 }}" \
            --budget "${{ github.event.inputs.budget || 240 }}"

      # The floor now tracks the committed row count (see validate_corpus._committed_row_count),
      # so it cannot go stale the way the old hardcoded --min-rows 672 did against a 1303-row
      # corpus. checkout's default fetch-depth:1 still carries HEAD's tree, so `git show
      # HEAD:<csv>` resolves; if it ever doesn't, the helper falls back to --min-rows.
      - name: Validate the corpus (a bad scrape must never merge)
        run: python scripts/validate_corpus.py

      - name: Rebuild the retrieval index
        run: python backend-api/agents/build_comparables_index.py

      - name: Re-run the retrieval eval (a bigger corpus must not regress quality)
        run: python eval/comparables_eval.py || echo "::warning::comparables eval reported a regression"

      - name: Commit the grown corpus
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # price_history.csv accrues on EVERY successful scrape (re-sightings), even when no
          # new listings joined the corpus — so it is part of both the diff check and the add.
          git add -N data/processed/price_history.csv 2>/dev/null || true
          if git diff --quiet -- data/processed/comparables.csv backend-api/models/comparables_index.joblib data/processed/price_history.csv; then
            echo "no new listings and no new sightings — nothing to commit"
            exit 0
          fi
          # Record count, not line count: titles contain embedded newlines inside quoted
          # CSV fields, so `wc -l` overstated the corpus (a past commit claimed 1306 for a
          # 1303-row file). The commit message is the project's data history — keep it true.
          rows=$(python -c "import pandas as pd; print(len(pd.read_csv('data/processed/comparables.csv')))")
          git add data/processed/comparables.csv data/processed/price_history.csv backend-api/models/comparables_index.joblib eval/comparables_eval.json
          # honest history: a snapshots-only run must not claim the corpus grew
          if git diff --cached --quiet -- data/processed/comparables.csv; then
            snaps=$(python -c "import pandas as pd; print(len(pd.read_csv('data/processed/price_history.csv')))")
            git commit -m "data: accrue price snapshots to ${snaps} sightings, corpus unchanged at ${rows} (automated)"
          else
            git commit -m "data: grow comparables corpus to ${rows} listings (automated)"
          fi
          git push

  # One-click capture of a REAL actor payload as a committed test fixture, using the APIFY_TOKEN
  # secret that already exists — so nobody has to handle the credential locally. Costs nothing:
  # listing runs and reading a dataset are not billed, and this never starts a run. Free-tier
  # datasets are retained ~7 days, so capture it before the last run's data expires.
  # Trigger: Actions -> "Grow comparables corpus" -> Run workflow -> capture_fixture = true.
  capture-fixture:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.capture_fixture == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install --quiet requests pandas
      - name: Capture the fixture (answers whether the search payload carries photos)
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python scripts/recover_apify_fixture.py --limit 3
      - name: Run the harvester regression test against the real payload
        run: python eval/test_photo_harvest.py
      - name: Commit the fixture
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- eval/fixtures/apify_items.json 2>/dev/null && \
             ! git ls-files --others --exclude-standard eval/fixtures | grep -q .; then
            echo "no fixture change — nothing to commit"
            exit 0
          fi
          git add eval/fixtures/apify_items.json
          git commit -m "test(cv): capture real Apify payload as a photo-harvester fixture"
          git push
