# AutoValuate — one-command local dev with prod-parity (Linux) backend.
#
#   docker compose up --build           → API on http://localhost:8000
#   docker compose --profile web up     → API + Next.js dev server on http://localhost:3000
#
# The frontend service is opt-in (profile "web") because most contributors run
# `npm run dev` natively for fast HMR; the containerized web service exists for
# "clean machine" onboarding. Secrets: put GROQ_API_KEY / GEMINI_API_KEY etc. in a
# root .env file (gitignored) — compose passes them through; everything degrades
# gracefully to the template/report fallbacks without them.

services:
  api:
    build: ./backend-api
    ports:
      - "8000:8000"
    environment:
      USE_TF: "0"
      # LLM keys are optional — the report agent falls back to the deterministic template.
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    # dev loop: edit backend code on the host, container restarts uvicorn on change
    develop:
      watch:
        - action: sync+restart
          path: ./backend-api
          target: /app
          ignore: ["__pycache__/"]

  web:
    profiles: ["web"]
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      # the browser (on the host) calls the API through the published port
      NEXT_PUBLIC_API_URL: "http://127.0.0.1:8000"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api

volumes:
  web_node_modules:
